name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - - name: Create .env file for CI env
      env:
        CI_BASE_URL: ${{ secrets.BASE_URL }}
        CI_ADMIN_USER: ${{ secrets.ADMIN_USER }}
        CI_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      run: |
        echo "BASE_URL=$CI_BASE_URL" >> .env
        echo "ADMIN_USER=$CI_ADMIN_USER" >> .env
        echo "ADMIN_PASSWORD=$CI_ADMIN_PASSWORD" >> .env

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30